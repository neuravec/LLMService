# Azure OpenAI config — copy to config.yaml and fill in your values.
# Supports env-var substitution: ${AZURE_OPENAI_KEY}

api_key: ${AZURE_OPENAI_KEY}
endpoint: https://your-resource.openai.azure.com
model_name: gpt-4.1

# --- optional (all have sensible defaults) ---
